<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="display: flex; justify-content: center;">
    <div>
        <canvas id="grafico1" style="width: 40vw;"></canvas>
    </div>
    <div>
        <canvas id="grafico2" style="width: 40vw;"></canvas>
    </div>
</body>
<script>
    let ctx = document.getElementById('grafico1');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
            datasets: [{
                label: 'Temperatura',
                backgroundColor: 'rgb(255, 00, 00)',
                borderColor: 'rgb(255, 00 ,00)',
                data: [30, 29, 28, 25, 22, 23],
                borderWidth: 1
            }, {
                label: 'Umidade',
                backgroundColor: 'rgb(0, 00, 255)',
                borderColor: 'rgb( 0, 00 ,255)',
                data: [80, 82, 80, 85, 80, 83],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: false
                }
            }
        }
    });

    let ctx2 = document.getElementById('grafico2');

     new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho'],
            datasets: [{
                label: 'Temperatura média',
                backgroundColor: 'rgb(255, 00, 00)',
                borderColor: 'rgb(255, 00 ,00)',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 1
            }, {
                label: 'Umidade média',
                backgroundColor: 'rgb(0, 00, 255)',
                borderColor: 'rgb( 0, 00 ,255)',
                data: [90, 89, 93, 87, 88, 82],
                borderWidth: 1
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: false
                }
            }
        }
    });
</script>
</html>
